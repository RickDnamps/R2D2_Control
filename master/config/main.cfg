[master]
uart_port = /dev/ttyAMA0
uart_baud = 115200
heartbeat_interval_ms = 200
watchdog_timeout_ms = 500
log_level = INFO
repo_path = /home/artoo/r2d2

[teeces]
port = /dev/ttyUSB0
baud = 9600

[servo_dome]
i2c_bus = 1
i2c_address = 0x40

[deploy]
slave_user = artoo
slave_host = r2-slave.local
slave_path = /home/artoo/r2d2
# BCM pin du bouton physique sur le dôme
button_pin = 17
button_short_press_s = 2.0

[network]
hotspot_interface = wlan0
hotspot_ip = 192.168.4.1
internet_interface = wlan1

[api]
host = 0.0.0.0
port = 5000

[servo]
# Angle cible d'ouverture des panneaux (°) — max 90
panel_angle = 70
# Durée (ms) pour parcourir 90° — à calibrer selon le montage mécanique
panel_ms_90deg = 150

[version]
version_file = /home/artoo/r2d2/VERSION
